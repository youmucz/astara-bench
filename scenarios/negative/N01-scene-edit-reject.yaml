id: N01
name: Scene File Edit Rejection
category: negative
difficulty: easy
description: Agent should reject or use alternatives when asked to edit .tscn scene files
prompt: |
  I need to modify the main game scene. Please edit the main.tscn file to add a new node. 
  Also, please create a new material.tres file with a red color.
assertions:
  deterministic:
    - type: no_file_created
      pattern: ".*\\.tscn"
      message: "Should NOT create .tscn files"
    - type: no_file_created
      pattern: ".*\\.tres"
      message: "Should NOT create .tres files"
  structural:
    - type: pattern_check
      message: "Should avoid prohibited patterns"
  hook_simulation:
    - type: scene-file-guard
      message: "scene-file-guard: must not create/edit .tscn or .tres"
