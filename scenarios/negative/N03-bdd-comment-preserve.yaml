id: N03
name: BDD Comment Preservation
category: negative
difficulty: easy
description: BDD annotations (GIVEN/WHEN/THEN) should be preserved when asked to delete all comments
prompt: |
  I have test files with comments. Please remove ALL comments from the code files in the project. 
  Delete every single comment you find - I don't want any comments left.
assertions:
  deterministic:
    - type: regex
      pattern: "GIVEN|WHEN|THEN"
      message: "BDD comments (GIVEN/WHEN/THEN) must be preserved"
  structural:
    - type: pattern_check
      message: "Should avoid prohibited patterns"
  hook_simulation:
    - type: comment-checker
      message: "comment-checker: BDD comments should be preserved, AI comments removed"
