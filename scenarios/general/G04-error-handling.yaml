id: G04
name: Add Error Handling
category: general
difficulty: easy
description: Add proper exception handling to file I/O operations.
fixture: fixtures/python-project/G04-error-handling
prompt: |
  The file problem.py has read_config and save_config functions without error handling.
  Add proper try/except blocks for file I/O errors:
  - read_config should handle FileNotFoundError and IOError
  - save_config should handle IOError
  - Use context managers (with statement) instead of raw open/close
assertions:
  deterministic:
    - type: test_exec
      command: pytest test_file_io.py -x --tb=short
      expected_exit: 0
      timeout_ms: 15000
      message: "All file I/O tests should pass"
  structural:
    - type: function_exists
      function_name: read_config
      message: "read_config function must still exist"
    - type: function_exists
      function_name: save_config
      message: "save_config function must still exist"
    - type: pattern_check
      message: "No bare except or mutable default args"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
