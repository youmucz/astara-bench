id: G03
name: Refactor Extract Method
category: general
difficulty: medium
description: Refactor a long function by extracting helper methods for readability.
fixture: fixtures/python-project/G03-extract-method
prompt: |
  The file problem.py contains a process_orders function that is too long and unstructured.
  Refactor it by extracting helper methods for:
  - Shipping discount calculation
  - Pending order bonus calculation
  - Cancellation penalty calculation
  Keep the same behavior and ensure all existing tests pass.
assertions:
  deterministic:
    - type: test_exec
      command: pytest test_processor.py -x --tb=short
      expected_exit: 0
      timeout_ms: 15000
      message: "All processor tests should pass after refactoring"
  structural:
    - type: function_exists
      function_name: process_orders
      message: "process_orders function must still exist"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
