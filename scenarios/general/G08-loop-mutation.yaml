id: G08
name: Fix Loop Mutation
category: general
difficulty: easy
description: Fix list modification during iteration bugs.
fixture: fixtures/python-project/G08-loop-mutation
prompt: |
  The file problem.py contains two functions that modify lists while iterating over them.
  remove_negatives uses pop() while iterating with range(len()).
  filter_invalid uses remove() while iterating over items.
  Rewrite both functions using list comprehensions to avoid mutating during iteration.
assertions:
  deterministic:
    - type: test_exec
      command: pytest test_loop.py -x --tb=short
      expected_exit: 0
      timeout_ms: 15000
      message: "All loop tests should pass"
  structural:
    - type: pattern_check
      message: "No prohibited patterns"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
