id: G06
name: Add Input Validation
category: general
difficulty: easy
description: Add input validation to a user registration function.
fixture: fixtures/python-project/G06-input-validation
prompt: |
  The file problem.py has a register_user function that accepts any input without validation.
  Add validation that raises ValueError for:
  - Empty username or shorter than 3 characters
  - Email without @ symbol
  - Age not an integer or outside 0-150 range
assertions:
  deterministic:
    - type: test_exec
      command: pytest test_validation.py -x --tb=short
      expected_exit: 0
      timeout_ms: 15000
      message: "All validation tests should pass"
  structural:
    - type: function_exists
      function_name: register_user
      message: "register_user function must still exist"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
