id: G10
name: Fix Mutable Default Args
category: general
difficulty: easy
description: Fix mutable default argument anti-patterns.
fixture: fixtures/python-project/G10-mutable-default
prompt: |
  The file problem.py has three functions using mutable default arguments (list/dict),
  which causes state to leak between function calls.
  Fix each function to use None as default and initialize the mutable object inside the function:
  - add_item: items default is an empty list
  - add_score: scores default is an empty dict
  - register_handler: handlers default is an empty list
assertions:
  deterministic:
    - type: test_exec
      command: pytest test_defaults.py -x --tb=short
      expected_exit: 0
      timeout_ms: 15000
      message: "All mutable default tests should pass"
  structural:
    - type: pattern_check
      message: "No mutable default arguments detected"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
