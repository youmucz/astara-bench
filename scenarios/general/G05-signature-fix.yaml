id: G05
name: Fix Function Signature
category: general
difficulty: easy
description: Fix function parameter types from strings to proper types.
fixture: fixtures/python-project/G05-signature-fix
prompt: |
  The file problem.py has a search_items function with parameters typed as strings
  where they should be proper types:
  - limit parameter is a string but should be int with default 10
  - case_sensitive parameter is a string but should be bool with default False
  Fix the function signature to use proper types and update the implementation accordingly.
assertions:
  deterministic:
    - type: test_exec
      command: pytest test_signature.py -x --tb=short
      expected_exit: 0
      timeout_ms: 15000
      message: "All signature tests should pass"
  structural:
    - type: function_exists
      function_name: search_items
      message: "search_items function must still exist"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
