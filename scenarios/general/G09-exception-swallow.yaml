id: G09
name: Fix Exception Swallowing
category: general
difficulty: medium
description: Replace bare except clauses with specific exception types.
fixture: fixtures/python-project/G09-exception-swallow
prompt: |
  The file problem.py has three functions that use bare 'except:' clauses,
  which silently swallow all exceptions including KeyboardInterrupt.
  Fix each function to catch only specific exception types:
  - parse_number: catch ValueError and TypeError
  - read_file: catch FileNotFoundError and IOError
  - safe_divide: catch ZeroDivisionError and TypeError
assertions:
  deterministic:
    - type: test_exec
      command: pytest test_exceptions.py -x --tb=short
      expected_exit: 0
      timeout_ms: 15000
      message: "All exception tests should pass"
  structural:
    - type: pattern_check
      message: "No bare except detected"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
