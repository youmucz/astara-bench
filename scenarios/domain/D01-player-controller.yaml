id: D01
name: Player Controller (2D Platformer)
category: domain
difficulty: medium
description: 2D platformer player controller with movement, jumping, animation, and input handling
prompt: |
  Create a 2D platformer player controller in GDScript. It should:
  - Extend CharacterBody2D
  - Handle left/right movement with acceleration/deceleration
  - Implement jumping with variable height (hold to jump higher)
  - Play animations (idle, run, jump, fall) via AnimatedSprite2D
  - Use @export for configurable speed and jump values
  - Handle input via Input.get_vector or Input.get_axis
  - Use _physics_process for all physics
assertions:
  deterministic:
    - type: regex
      pattern: "extends CharacterBody2D"
      message: "Must extend CharacterBody2D"
    - type: regex
      pattern: "move_and_slide"
      message: "Must call move_and_slide()"
    - type: regex
      pattern: "@export"
      message: "Must use @export for configurable values"
    - type: regex-not
      pattern: '\.free\s*\(\s*\)'
      message: "Should not use free()"
  structural:
    - type: function_exists
      function_name: "_physics_process"
      message: "Physics must be in _physics_process"
    - type: naming_check
      file: "player_controller.gd"
      message: "File must be snake_case.gd"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn/.tres files"
