id: D09
name: Resource Data Class
category: domain
difficulty: easy
description: ItemData Resource as a pure data container with @export properties
prompt: |
  Create an ItemData Resource in GDScript:
  - Extend Resource
  - Use @export for: name (String), description (String), icon (Texture2D), stackable (bool), max_stack (int)
  - This should be a PURE data container with NO behavior methods
  - Use class_name for type registration
assertions:
  deterministic:
    - type: regex
      pattern: "extends Resource"
      message: "Must extend Resource"
    - type: regex
      pattern: "@export"
      message: "Must use @export for all properties"
    - type: regex
      pattern: "class_name"
      message: "Must use class_name for type registration"
  structural:
    - type: regex-not
      pattern: "func "
      message: "Resource should be pure data, no methods"
    - type: naming_check
      file: "item_data.gd"
      message: "File must be snake_case.gd"
  hook_simulation:
    - type: comment-checker
      message: "No AI comments"
