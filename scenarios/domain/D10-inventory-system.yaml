id: D10
name: Inventory System
category: domain
difficulty: hard
description: Inventory with add/remove/stack operations and signal-based UI notification
prompt: |
  Create an inventory system in GDScript:
  1. inventory.gd - Manages items in an Array or Dictionary
  2. inventory_ui.gd - UI that displays inventory, updated via signals
  
  The inventory should:
  - Support add_item(item_data, amount), remove_item(item_id, amount)
  - Handle stacking (combine items with same ID)
  - Emit signals: item_added, item_removed, inventory_changed
  - Have max capacity via @export
  - Keep data (inventory) and display (UI) separate
assertions:
  deterministic:
    - type: regex
      pattern: "signal"
      message: "Must define signals for inventory events"
    - type: regex
      pattern: "@export"
      message: "Must use @export for configurable values"
  structural:
    - type: function_exists
      function_name: "add_item"
      message: "Must have add_item method"
    - type: function_exists
      function_name: "remove_item"
      message: "Must have remove_item method"
    - type: signal_exists
      signal_name: "inventory_changed"
      message: "Must emit inventory_changed signal"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
