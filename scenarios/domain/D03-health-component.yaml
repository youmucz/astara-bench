id: D03
name: Health Component
category: domain
difficulty: easy
description: Reusable HealthComponent using composition pattern with signals and @export
prompt: |
  Create a reusable HealthComponent in GDScript that:
  - Extends Node (for composition, not inheritance)
  - Has @export var max_health: int with a default value
  - Tracks current_health
  - Emits signals: health_changed(new_value), died(), damaged(amount), healed(amount)
  - Has take_damage(amount) and heal(amount) methods
  - Clamps health between 0 and max_health
  - Can be added as a child node to any entity
assertions:
  deterministic:
    - type: regex
      pattern: "extends Node"
      message: "Must extend Node for composition"
    - type: regex
      pattern: "@export"
      message: "Must use @export for max_health"
    - type: regex
      pattern: "signal"
      message: "Must define signals"
    - type: regex
      pattern: "clampf|clampi|clamp"
      message: "Must clamp health values"
  structural:
    - type: function_exists
      function_name: "take_damage"
      message: "Must have take_damage method"
    - type: function_exists
      function_name: "heal"
      message: "Must have heal method"
    - type: signal_exists
      signal_name: "health_changed"
      message: "Must emit health_changed signal"
    - type: signal_exists
      signal_name: "died"
      message: "Must emit died signal"
  hook_simulation:
    - type: comment-checker
      message: "Should not have AI-style comments"
