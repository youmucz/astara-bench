id: D02
name: Enemy AI (Patrol & Chase)
category: domain
difficulty: hard
description: Enemy AI with patrol, chase, and state management using NavigationAgent2D
prompt: |
  Create an enemy AI script in GDScript that:
  - Extends CharacterBody2D
  - Has patrol and chase states using a state machine pattern
  - Uses NavigationAgent2D for pathfinding
  - Detects player via Area2D detection zone
  - Patrols between waypoints
  - Chases player when detected, returns to patrol when player escapes
  - Uses enum for states
assertions:
  deterministic:
    - type: regex
      pattern: "extends CharacterBody2D"
      message: "Must extend CharacterBody2D"
    - type: regex
      pattern: "NavigationAgent2D"
      message: "Must use NavigationAgent2D"
    - type: regex
      pattern: "enum"
      message: "Must use enum for states"
  structural:
    - type: function_exists
      function_name: "_physics_process"
      message: "Must use _physics_process"
    - type: function_exists
      function_name: "_ready"
      message: "Must initialize in _ready"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
