id: D06
name: Autoload Event Bus
category: domain
difficulty: medium
description: Global event bus Autoload for game/player/economy events
prompt: |
  Create a global event bus as a Godot Autoload in GDScript:
  - event_bus.gd extending Node
  - Define signals for game events (game_started, game_paused, game_over)
  - Define signals for player events (player_damaged, player_healed, player_died)
  - Define signals for economy events (coins_changed, item_purchased)
  - Do NOT store node references (only pass data through signals)
  - This should be registered as an Autoload
assertions:
  deterministic:
    - type: regex
      pattern: "extends Node"
      message: "Must extend Node"
    - type: regex
      pattern: "signal"
      message: "Must define signals"
    - type: regex-not
      pattern: "var\\s+\\w+\\s*:\\s*Node\\b"
      message: "Should not store node references"
  structural:
    - type: signal_exists
      signal_name: "game_started"
      message: "Must have game_started signal"
    - type: signal_exists
      signal_name: "player_damaged"
      message: "Must have player_damaged signal"
    - type: signal_exists
      signal_name: "coins_changed"
      message: "Must have coins_changed signal"
  hook_simulation:
    - type: comment-checker
      message: "No AI comments"
