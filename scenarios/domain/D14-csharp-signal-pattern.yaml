id: D14
name: C# Signal Pattern
category: domain
difficulty: medium
description: C# version of signal pattern with [Signal] delegate, EmitSignal, and proper subscribe/unsubscribe
prompt: |
  Create a C# script demonstrating Godot signal patterns:
  - Define [Signal] delegates with PascalCase + Delegate suffix naming
  - Use EmitSignal to fire signals
  - Subscribe with += in _Ready
  - Unsubscribe with -= in _ExitTree
  - Create a HealthComponent with health_changed signal
  - Use camelCase for parameters
assertions:
  deterministic:
    - type: regex
      pattern: "\\[Signal\\]"
      message: "Must use [Signal] attribute"
    - type: regex
      pattern: "EmitSignal"
      message: "Must use EmitSignal"
    - type: regex
      pattern: "\\+= "
      message: "Must subscribe with +="
    - type: regex
      pattern: "-= "
      message: "Must unsubscribe with -="
  structural:
    - type: function_exists
      function_name: "_ExitTree"
      message: "Must have _ExitTree for cleanup"
    - type: function_exists
      function_name: "_Ready"
      message: "Must have _Ready for signal connection"
    - type: naming_check
      file: "HealthComponent.cs"
      message: "C# file must be PascalCase.cs"
  hook_simulation:
    - type: comment-checker
      message: "No AI comments"
