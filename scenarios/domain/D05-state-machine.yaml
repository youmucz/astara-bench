id: D05
name: State Machine
category: domain
difficulty: hard
description: Generic state machine with enter/exit/update transitions using child nodes as states
prompt: |
  Create a generic state machine in GDScript:
  1. state_machine.gd - Main state machine that manages transitions
  2. state.gd - Base state with enter(), exit(), update(), physics_update() methods
  
  The state machine should:
  - Use child nodes as states
  - Support transition_to(state_name) method
  - Call enter/exit when transitioning
  - Emit signal on state_changed
  - Initialize with initial_state @export var
assertions:
  deterministic:
    - type: regex
      pattern: "extends Node"
      message: "State machine should extend Node"
    - type: regex
      pattern: "signal.*state_changed"
      message: "Must emit state_changed signal"
    - type: regex
      pattern: "@export"
      message: "Should use @export for initial_state"
  structural:
    - type: function_exists
      function_name: "transition_to"
      message: "Must have transition_to method"
    - type: function_exists
      function_name: "enter"
      message: "State must have enter method"
    - type: function_exists
      function_name: "exit"
      message: "State must have exit method"
    - type: function_exists
      function_name: "update"
      message: "State must have update method"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
