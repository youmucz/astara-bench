id: D11
name: Audio Manager
category: domain
difficulty: medium
description: AudioManager Autoload with BGM fade, SFX playback, and bus control
prompt: |
  Create an AudioManager Autoload in GDScript:
  - audio_manager.gd extending Node with two AudioStreamPlayer children for BGM and SFX
  - play_bgm(stream, fade_time) with fade in/out
  - play_sfx(stream) for one-shot SFX
  - set_volume(bus_name, value) for volume control
  - Use Audio bus layout: Master, BGM, SFX
  - Clean up temporary players with queue_free (not free)
assertions:
  deterministic:
    - type: regex
      pattern: "extends Node"
      message: "Must extend Node for Autoload"
    - type: regex
      pattern: "queue_free"
      message: "Must use queue_free for cleanup"
    - type: regex-not
      pattern: '\.free\s*\(\s*\)'
      message: "Must not use free()"
  structural:
    - type: function_exists
      function_name: "play_bgm"
      message: "Must have play_bgm method"
    - type: function_exists
      function_name: "play_sfx"
      message: "Must have play_sfx method"
    - type: function_exists
      function_name: "set_volume"
      message: "Must have set_volume method"
    - type: naming_check
      file: "audio_manager.gd"
      message: "File must be snake_case.gd"
  hook_simulation:
    - type: comment-checker
      message: "No AI comments"
