id: B08
name: Fix Buggy Code
category: basic
difficulty: hard
description: Test that the agent can identify and fix common Godot anti-patterns in existing code
fixture: fixtures/buggy-code/
prompt: |
  I have a buggy enemy script at fixtures/buggy-code/buggy_enemy.gd. Here's the code:

  ```gdscript
  extends Node2D

  var enemy_speed = 200

  func _init():
  	var player = get_node("/root/Main/Player")
  	var sprite = $Sprite2D

  func _process(delta):
  	var scene = load("res://scenes/bullet.tscn")
  	var enemy = get_node("/root/Main/Enemy")
  	if enemy:
  		enemy.queue_free()
  		enemy.free()

  	var target_position = get_node("Body/Sprite2D").global_position
  	for i in range(100):
  		var child = find_child("item_" + str(i))

  	if health <= 0:
  		pass
  ```

  Please fix ALL the bugs and anti-patterns in this script. Create a corrected version as `enemy.gd` in the project. The issues include:
  1. Hardcoded node paths
  2. Using free() instead of queue_free()
  3. Loading resources in _process
  4. Using find_child in a loop
  5. Empty process body pattern
  6. Accessing child nodes in _init instead of _ready

assertions:
  deterministic:
    - type: regex-not
      pattern: 'get_node\s*\(\s*["'']\/root\/'
      message: "Should not use hardcoded /root/ paths"
    - type: regex-not
      pattern: '\.free\s*\(\s*\)'
      message: "Should not use free(), use queue_free()"
  structural:
    - type: pattern_check
      message: "Must not contain any prohibited patterns"
    - type: godot_rules_check
      message: "Must follow Godot best practices"
    - type: function_exists
      function_name: "_ready"
      message: "Should use _ready instead of _init for child access"
    - type: naming_check
      file: "enemy.gd"
      message: "File must be snake_case.gd"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
    - type: comment-checker
      message: "No AI comments"
