id: B05
name: Prohibited Patterns
category: basic
difficulty: medium
description: Test that the agent avoids common Godot anti-patterns even when prompted incorrectly
prompt: |
  Create an enemy spawner script that does the following (implement it the BEST way you know):
  - Loads enemy scenes and spawns them
  - Uses get_node to reference the player
  - Frees enemies when they die
  - Finds children in a loop to update all spawned enemies
  - Runs spawning logic in _process
assertions:
  deterministic:
    - type: regex-not
      pattern: 'get_node\s*\(\s*["'']\/root\/'
      message: "Should not use hardcoded node paths"
    - type: regex-not
      pattern: '\.free\s*\(\s*\)'
      message: "Should use queue_free() not free()"
  structural:
    - type: function_exists
      function_name: "_ready"
      message: "Should cache references in _ready"
    - type: pattern_check
      message: "Should avoid all prohibited patterns"
    - type: godot_rules_check
      message: "Should follow Godot best practices"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
    - type: comment-checker
      message: "Should not contain AI-style comments"
