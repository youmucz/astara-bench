id: B04
name: Directory Structure
category: basic
difficulty: easy
description: Test that the agent creates proper directory structure for a Godot project
prompt: |
  Set up a proper Godot project directory structure. Create the following directories and placeholder files:
  - src/scripts/ with a game_manager.gd
  - src/scenes/ (directory only)
  - src/resources/ with a game_config.gd Resource
  - src/assets/ (directory only)
  
  All paths should use res:// convention. Game manager should extend Node and be an Autoload candidate.
assertions:
  deterministic:
    - type: regex
      pattern: "extends Node"
      message: "Game manager should extend Node"
    - type: regex
      pattern: "res://"
      message: "Should use res:// paths"
  structural:
    - type: function_exists
      function_name: "_ready"
      message: "Should have _ready function"
    - type: extends_type
      extends_type: "Node"
      message: "Must extend Node for Autoload"
    - type: naming_check
      file: "game_manager.gd"
      message: "File must follow snake_case naming"
    - type: naming_check
      file: "game_config.gd"
      message: "Resource file must follow snake_case naming"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
