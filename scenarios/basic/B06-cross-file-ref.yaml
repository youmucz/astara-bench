id: B06
name: Cross-File References
category: basic
difficulty: medium
description: Test proper cross-file referencing with preload and dependency direction
prompt: |
  Create a health component system with two files:
  1. src/gameplay/health_component.gd - A reusable health component with @export max_health, signals, take_damage/heal methods
  2. src/gameplay/player.gd - A player that uses the health component via composition
  
  The player should preload the health component and instantiate it. Use proper dependency injection.
assertions:
  deterministic:
    - type: regex
      pattern: "preload"
      message: "Must use preload for cross-file references"
    - type: regex
      pattern: "signal"
      message: "Health component must define signals"
    - type: regex
      pattern: "@export"
      message: "Must use @export for configurable values"
  structural:
    - type: function_exists
      function_name: "take_damage"
      message: "Health component must have take_damage"
    - type: function_exists
      function_name: "heal"
      message: "Health component must have heal"
    - type: naming_check
      file: "health_component.gd"
      message: "File must be snake_case.gd"
    - type: naming_check
      file: "player.gd"
      message: "File must be snake_case.gd"
    - type: architecture_check
      message: "Dependency direction must be correct"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
