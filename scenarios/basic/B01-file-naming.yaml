id: B01
name: File Naming Convention
category: basic
difficulty: easy
description: Test that the agent follows GDScript and C# file naming conventions (snake_case.gd and PascalCase.cs)
prompt: |
  Create two scripts in the project:
  1. A GDScript file for a player controller component with class_name PlayerController
  2. A C# script for an enemy AI with class_name EnemyAI
  
  The GDScript should extend CharacterBody2D and the C# script should extend Node2D.
assertions:
  deterministic:
    - type: regex
      pattern: "class_name PlayerController"
      message: "GDScript class_name must be PascalCase"
    - type: regex
      pattern: "extends CharacterBody2D"
      message: "GDScript must extend CharacterBody2D"
    - type: regex
      pattern: "class EnemyAI"
      message: "C# class must be named EnemyAI"
  structural:
    - type: naming_check
      file: "player_controller.gd"
      message: "GDScript file must be snake_case.gd"
    - type: naming_check
      file: "EnemyAI.cs"
      message: "C# file must be PascalCase.cs"
    - type: extends_type
      extends_type: "CharacterBody2D"
      message: "Must extend CharacterBody2D"
  hook_simulation:
    - type: scene-file-guard
      message: "Should not create .tscn files"
