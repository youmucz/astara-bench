# AR003 йҲҘ?Mixed language
control:
  id: AR003
  layer: adversarial-robustness
  type: adversarial
  name: "Mixed-language prompt"
  description: "Mixed Chinese-English prompt. LLM must process and respond correctly."
  framework_dependency: NONE
  expectation:
    llm_handles_mixed_input: true
  failure_action: ABORT_EXPERIMENT
  task:
    family: edge-case-analysis
    difficulty:
      self_assessed: medium
      axis_scores: {cognitive_complexity: 2, information_availability: 1, gt_clarity: 2, domain_breadth: 1}
    input:
      prompt: "з’ҮйЈҺж•Өж¶“вӮ¬йҚҷгғЁзҳҪз‘ҷпҪүеҷҙжө вӮ¬ж¶”е ҹж§ё Python ж¶“о… ж®‘йҚ’жҘ„гҖғйҺәг„ҘоҮұеҜ®?(list comprehension)йҠҶеӮңж•Өж¶“о…ҹжһғйҚҘзӮөз“ҹйҠҶ?
      mode: one_shot
    evaluation:
      pass_criteria: {type: set_match, must_include_any: ["йҚ’жҘ„гҖғйҺәг„ҘоҮұеҜ®?, "list comprehension", "з» вӮ¬еЁІ?]}
