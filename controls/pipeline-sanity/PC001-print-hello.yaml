# PC001 鈥?Print HELLO
# Positive control: any SOTA LLM must pass > 99% of the time.
control:
  id: PC001
  layer: pipeline-sanity
  type: positive
  name: "Trivial: print HELLO"
  description: "Asks the LLM to print exactly HELLO. Any working LLM must pass."
  framework_dependency: NONE
  expectation:
    top_model_pass_rate: ">= 0.99"
    our_scorer_pass_rate: "= 1.00"
  failure_action: ABORT_EXPERIMENT
  task:
    family: shell-scripting
    difficulty:
      self_assessed: easy
      axis_scores: {cognitive_complexity: 1, information_availability: 1, gt_clarity: 1, domain_breadth: 1}
    input:
      prompt: "Print exactly the string HELLO (uppercase). Reply with only that string."
      mode: one_shot
    evaluation:
      pass_criteria: {type: exact_match, value: "HELLO"}
