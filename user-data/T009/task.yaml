  difficulty:
    self_assessed: easy
    rationale: "Generated by gen-bulk-tests.py. Axes sum to 4 for level easy."
    axis_scores:
      cognitive_complexity: 1
      information_availability: 1
      gt_clarity: 1
      domain_breadth: 1

  family: test-writing
  sub_family: happy-path

  input:
    prompt: |
      Write a pytest test for this function:
      ```python
      def add(a, b):
          return a + b
      ```
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set
      must_include_any:
        - "def test_add"
        - "add(2, 3) == 5"
        - "happy path"
        - "assert"
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
