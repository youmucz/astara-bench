task:
  id: T002
  version: 1
  created: 2026-06-09
  author: keely-bench-pilot
  reviewer: keely-bench-pilot

  difficulty:
    self_assessed: easy
    rationale: "Short function, 1 well-known issue (no zero check). Sum 5 → easy."
    axis_scores:
      cognitive_complexity: 2
      information_availability: 1
      gt_clarity: 1
      domain_breadth: 1

  family: code-review
  sub_family: defect-identification

  input:
    prompt: |
      Review this 2-line Python function. List all issues you find.
      Be specific. Empty list is acceptable if you find nothing.

      ```python
      def divide(a, b):
          return a / b
      ```
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set_match
      must_include_any:
        - ["no zero check", "division by zero", "b could be 0", "missing check"]
        - ["no type check", "no type hint", "missing type"]
    must_not_include:
      - ["syntax error"]
    timeout_sec: 30
    max_tokens: 500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
