task:
  id: T038
  version: 1
  created: 2026-06-09
  author: keely-bench-pilot
  reviewer: keely-bench-pilot

  difficulty:
    self_assessed: hard
    rationale: "Generated by gen-bulk-tests.py. Axes sum to 13 for level hard."
    axis_scores:
      cognitive_complexity: 4
      information_availability: 4
      gt_clarity: 2
      domain_breadth: 3

  family: code-review
  sub_family: architecture-review

  input:
    prompt: |
      Review this 500-line microservice code on 4 dimensions: API consistency, error handling, observability, security.
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set
      must_include_any:
        - "API consistency"
        - "error handling"
        - "observability"
        - "security"
        - "metrics"
        - "tracing"
        - "logging"
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
