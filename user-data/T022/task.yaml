    axis_scores:
      cognitive_complexity: 3
      information_availability: 2
      gt_clarity: 2
      domain_breadth: 1

  family: documentation
  sub_family: api-reference

  input:
    prompt: |
      Write API documentation for this endpoint:
      ```
      POST /api/v1/login
      Body: {email, password}
      Returns: {token, expires_in}
      Errors: 401 invalid, 429 rate-limit
      ```
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set
      must_include_any:
        - "endpoint"
        - "request body"
        - "response"
        - "errors"
        - "status codes"
        - "auth"
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
