task:
  id: T023
  version: 1
  created: 2026-06-09
  author: keely-bench-pilot
  reviewer: keely-bench-pilot

  difficulty:
    self_assessed: medium
    rationale: "Generated by gen-bulk-tests.py. Axes sum to 8 for level medium."
    axis_scores:
      cognitive_complexity: 3
      information_availability: 2
      gt_clarity: 2
      domain_breadth: 1

  family: test-writing
  sub_family: edge-cases

  input:
    prompt: |
      Write pytest tests for this function covering happy path, 1 boundary, 1 error:
      ```python
      def parse_age(s):
          if not s: raise ValueError('empty')
          n = int(s)
          if n < 0 or n > 150: raise ValueError('out of range')
          return n
      ```
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set
      must_include_any:
        - "test happy"
        - "test empty"
        - "test negative"
        - "test out_of_range"
        - "boundary"
        - "ValueError"
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
