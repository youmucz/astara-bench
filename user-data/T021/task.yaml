task:
  id: T021
  version: 1
  created: 2026-06-09
  author: keely-bench-pilot
  reviewer: keely-bench-pilot

  difficulty:
    self_assessed: medium
    rationale: "Generated by gen-bulk-tests.py. Axes sum to 9 for level medium."
    axis_scores:
      cognitive_complexity: 4
      information_availability: 2
      gt_clarity: 2
      domain_breadth: 1

  family: design-evaluation
  sub_family: api-design

  input:
    prompt: |
      Evaluate this REST API on 4 dimensions: consistency, error handling, idempotency, observability.
      ```
      POST /v1/user
      POST /users
      PUT /user/{id}
      DELETE /user/{id}  (no idempotency-key)
      ```
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set
      must_include_any:
        - "inconsistent"
        - "missing idempotency"
        - "DELETE not idempotent"
        - "naming inconsistency"
        - "v1 vs no version"
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
