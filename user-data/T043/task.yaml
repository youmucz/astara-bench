task:
  id: T043
  version: 1
  created: 2026-06-09
  author: keely-bench-pilot
  reviewer: keely-bench-pilot

  difficulty:
    self_assessed: hard
    rationale: "Generated by gen-bulk-tests.py. Axes sum to 12 for level hard."
    axis_scores:
      cognitive_complexity: 4
      information_availability: 3
      gt_clarity: 2
      domain_breadth: 3

  family: security-review
  sub_family: auth-flow

  input:
    prompt: |
      Review this authentication flow for security issues. List all vulns with severity.
    mode: one_shot

  evaluation:
    pass_criteria:
      type: list_f1
      expected_items:
        - "timing attack"
        - "session fixation"
        - "CSRF"
        - "logging secrets"
        - "replay attack"
        - "missing rate limit"
      min_precision: 0.6
      min_recall: 0.5
      min_f1: 0.55
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
