task:
  id: T028
  version: 1
  created: 2026-06-09
  author: keely-bench-pilot
  reviewer: keely-bench-pilot

  difficulty:
    self_assessed: medium
    rationale: "Generated by gen-bulk-tests.py. Axes sum to 8 for level medium."
    axis_scores:
      cognitive_complexity: 3
      information_availability: 2
      gt_clarity: 2
      domain_breadth: 1

  family: code-review
  sub_family: security-anti-patterns

  input:
    prompt: |
      Review this 80-line Flask app for security issues. List all vulnerabilities with severity.
    mode: one_shot

  evaluation:
    pass_criteria:
      type: list_f1
      expected_items:
        - "SQL injection"
        - "XSS"
        - "CSRF"
        - "missing auth"
        - "secret in code"
        - "missing HTTPS"
      min_precision: 0.6
      min_recall: 0.5
      min_f1: 0.55
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
