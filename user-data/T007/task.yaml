task:
  id: T007
  version: 1
  created: 2026-06-09
  author: keely-bench-pilot
  reviewer: keely-bench-pilot

  difficulty:
    self_assessed: easy
    rationale: "Generated by gen-bulk-tests.py. Axes sum to 5 for level easy."
    axis_scores:
      cognitive_complexity: 2
      information_availability: 1
      gt_clarity: 1
      domain_breadth: 1

  family: security-review
  sub_family: secret-leak

  input:
    prompt: |
      Review this code for security issues:
      ```python
      API_KEY = 'sk-1234567890abcdef'
      db_password = 'admin123'
      def connect():
          return f'postgresql://user:{db_password}@host/db'
      ```
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set
      must_include_any:
        - "hardcoded secret"
        - "API_KEY in source"
        - "password in source"
        - "use environment variable"
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
