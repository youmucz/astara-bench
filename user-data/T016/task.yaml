task:
  id: T016
  version: 1
  created: 2026-06-09
  author: keely-bench-pilot
  reviewer: keely-bench-pilot

  difficulty:
    self_assessed: medium
    rationale: "Generated by gen-bulk-tests.py. Axes sum to 8 for level medium."
    axis_scores:
      cognitive_complexity: 3
      information_availability: 2
      gt_clarity: 2
      domain_breadth: 1

  family: code-review
  sub_family: refactoring-review

  input:
    prompt: |
      Review this 50-line Python module. List at least 3 issues and rank by severity.
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set
      must_include_any:
        - "magic number"
        - "long function"
        - "no error handling"
        - "no docstring"
        - "duplicate code"
    timeout_sec: 60
    max_tokens: 1500

  contamination:
    blocklist_check: true
    no_famous_cve_pattern: true
    identifier_randomized: true
    gt_in_separate_file: true
    answer_not_in_prompt: true
    pr_dual_approved: true
    checksum: pending
