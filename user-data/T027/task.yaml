      information_availability: 2
      gt_clarity: 2
      domain_breadth: 1

  family: refactoring
  sub_family: rename

  input:
    prompt: |
      Refactor this class to use proper encapsulation:
      ```python
      class User:
          def __init__(self):
              self.name = ''
              self.age = 0
              self.email = ''
      u = User()
      u.name = 'alice'
      ```
    mode: one_shot

  evaluation:
    pass_criteria:
      type: set
      must_include_any:
        - "@property"
        - "private"
        - "underscore"
        - "setter"
        - "validation"
        - "encapsulation"
    timeout_sec: 60
    max_tokens: 1500

  contamination:
